<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0010" />
  <title>SUPER PANG DE LA COMARCA</title>

  <!-- Fuente pixel/arcade gratuita. Si no hay red, cae a monospace. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- =======================================================================
       Marco arcade (#cabinet). La pantalla 4:3 (#screen) y los mandos táctiles
       ocupan regiones SEPARADAS para que los botones no tapen el juego:
         · vertical  → juego arriba, mandos en banda inferior
         · horizontal→ juego en el centro, mandos en franjas laterales
  ======================================================================== -->
  <div id="cabinet">
    <!-- Zona de juego: contiene SÓLO la pantalla. Los controles viven fuera
         para no tapar nunca el área jugable (ver CSS: grid por orientación). -->
    <div id="playfield">
      <div id="screen">
        <!-- Lienzo del juego. Resolución lógica fija (ver game.js); CSS escala. -->
        <canvas id="game" width="320" height="240"></canvas>
        <!-- Overlay CRT: scanlines + viñeta. Decorativo. -->
        <div id="crt" aria-hidden="true"></div>
        <!-- Botones de utilidad sobre la pantalla: pausa, mute, fullscreen. -->
        <div id="util-buttons">
          <button id="btn-pause"  title="Pausa (P)">❚❚</button>
          <button id="btn-mute"   title="Silenciar (M)">♪</button>
          <button id="btn-full"   title="Pantalla completa (F)">⛶</button>
        </div>
      </div>
    </div>

    <!-- Controles táctiles (sólo móvil). Movimiento + escaleras a un lado,
         disparo al otro. Posicionados FUERA del área de juego. -->
    <div id="pad-move" aria-hidden="true">
      <div class="grp grp-lr">
        <button class="tbtn" data-key="ArrowLeft"  aria-label="Izquierda">◀</button>
        <button class="tbtn" data-key="ArrowRight" aria-label="Derecha">▶</button>
      </div>
      <div class="grp grp-ud">
        <button class="tbtn tbtn-ud" data-key="ArrowUp"   aria-label="Subir">▲</button>
        <button class="tbtn tbtn-ud" data-key="ArrowDown" aria-label="Bajar">▼</button>
      </div>
    </div>
    <div id="pad-fire" aria-hidden="true">
      <button class="tbtn tbtn-fire" data-key="Space" aria-label="Disparar">⌁<br>FIRE</button>
    </div>
  </div>

  <p id="hint">
    ← → mover · ESPACIO disparar · ↑ ↓ escaleras · P pausa · ENTER start ·
    F pantalla completa · M mute
  </p>

  <!-- Datos de niveles primero, luego el motor. -->
  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
